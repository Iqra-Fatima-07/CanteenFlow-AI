kind = "web"
previewPath = "/"
title = "CanteenFlow AI"
version = "1.0.0"
id = "artifacts/canteenflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21192

[services.development]
run = "pnpm --filter @workspace/canteenflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/canteenflow", "run", "build" ]
publicDir = "artifacts/canteenflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21192"
BASE_PATH = "/"
